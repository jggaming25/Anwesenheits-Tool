<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Anwesenheits Check</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap" id="authWrap">
  <div class="auth-card">
    <h2>Willkommen zurück</h2>
    <p class="sub" id="subText">Melde dich an, um deine Gruppen zu verwalten.</p>

    <div class="auth-error" id="errorBox"></div>

    <div id="passwordFields">
      <input type="email" id="email" placeholder="E-Mail-Adresse" autocomplete="username">
      <input type="password" id="password" placeholder="Passwort" autocomplete="current-password">
      <button class="btn btn-primary" id="loginBtn">Anmelden</button>
      <p class="auth-link" style="margin-top:10px;"><a href="#" id="forgotLink">Passwort vergessen?</a></p>
    </div>

    <p class="auth-link">Noch kein Konto? <a href="register.html">Jetzt registrieren</a></p>
  </div>
</div>

<div class="auth-footer">
  <a href="impressum.html">Impressum</a> · <a href="datenschutz.html">Datenschutz</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const errorBox = document.getElementById("errorBox");
function showError(msg){ errorBox.textContent = msg; errorBox.classList.add("show"); }

async function ensureUserDoc(user){
  const ref = db.collection("users").doc(user.uid);
  const snap = await ref.get();
  if(!snap.exists){
    await ref.set({
      name: user.displayName || (user.email ? user.email.split("@")[0] : "Nutzer"),
      email: (user.email||"").toLowerCase(),
      emailVerified: true, // per Einladungslink ist der E-Mail-Besitz bereits nachgewiesen
      settings: { autoRefresh: true, darkMode: false },
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }
}
async function processPendingInvites(user){
  if(!user.email) return;
  const email = user.email.toLowerCase();
  const inviteRef = db.collection("invites").doc(email);
  const snap = await inviteRef.get();
  if(!snap.exists) return;
  const groupIds = snap.data().groupIds || [];
  for(const gid of groupIds){
    try{
      await db.collection("groups").doc(gid).update({
        members: firebase.firestore.FieldValue.arrayUnion(user.uid),
        [`memberInfo.${user.uid}`]: { email, name: user.displayName || email, addedAt: Date.now() },
        [`pendingInvites.${email}`]: firebase.firestore.FieldValue.delete()
      });
    }catch(e){ console.error(e); }
  }
  await inviteRef.delete().catch(()=>{});
}

// --- Einladungs-/Anmeldelink abschließen ---
if(auth.isSignInWithEmailLink(window.location.href)){
  document.getElementById("passwordFields").style.display = "none";
  document.getElementById("subText").textContent = "Anmeldung wird bestätigt…";
  let email = window.localStorage.getItem("emailForSignIn");
  if(!email){ email = window.prompt("Bitte bestätige deine E-Mail-Adresse für die Einladung:"); }
  if(email){
    auth.signInWithEmailLink(email, window.location.href)
      .then(async result => {
        window.localStorage.removeItem("emailForSignIn");
        await ensureUserDoc(result.user);
        await processPendingInvites(result.user);
        window.location.href = "index.html";
      })
      .catch(err => {
        document.getElementById("passwordFields").style.display = "block";
        document.getElementById("subText").textContent = "Melde dich an, um deine Gruppen zu verwalten.";
        showError("Anmeldelink ungültig oder abgelaufen: " + err.message);
      });
  }
} else {
  auth.onAuthStateChanged(user => { if(user) window.location.href = "index.html"; });
}

document.getElementById("loginBtn").addEventListener("click", () => {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value;
  if(!email || !pass){ showError("Bitte E-Mail und Passwort eingeben."); return; }

  auth.signInWithEmailAndPassword(email, pass)
    .then(async res => { await processPendingInvites(res.user); window.location.href = "index.html"; })
    .catch(err => {
      const messages = {
        "auth/invalid-credential": "E-Mail oder Passwort ist falsch.",
        "auth/user-not-found": "Kein Konto mit dieser E-Mail gefunden.",
        "auth/wrong-password": "Falsches Passwort.",
        "auth/invalid-email": "Ungültige E-Mail-Adresse.",
        "auth/too-many-requests": "Zu viele Versuche. Bitte später erneut probieren."
      };
      showError(messages[err.code] || "Anmeldung fehlgeschlagen: " + err.message);
    });
});

document.getElementById("forgotLink").addEventListener("click", (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value.trim();
  if(!email){ showError("Bitte zuerst deine E-Mail-Adresse oben eingeben."); return; }
  auth.sendPasswordResetEmail(email)
    .then(()=>{ errorBox.classList.remove("show"); alert("Wir haben dir eine E-Mail zum Zurücksetzen deines Passworts gesendet."); })
    .catch(err => showError("Fehler: " + err.message));
});
</script>
</body>
</html>
